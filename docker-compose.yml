services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    # NOTE: rag-api 通过 Docker 内部 DNS (http://ollama:11434) 访问 Ollama，
    # 不需要向宿主机暴露端口。如需外部调试 ollama，取消下面这行的注释：
    # ports: [ "127.0.0.1:11434:11434" ]
    command:
      - sh
      - -c
      - |
        ollama serve &
        sleep 3
        ollama pull qwen3-embedding:4b
        ollama pull qwen3.5:9b
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q qwen3-embedding && ollama list 2>/dev/null | grep -q qwen3.5"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 120s

  rag-api:
    build: .
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  ollama_data:
