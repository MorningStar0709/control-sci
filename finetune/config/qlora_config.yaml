model:
  name: "Qwen/Qwen3.5-9B"
  trust_remote_code: true
  attn_implementation: "eager"

bitsandbytes:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  target_modules: "all-linear"
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  init_lora_weights: "gaussian"

training:
  output_dir: "finetune/output/qlora"
  seed: 42
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 2
  learning_rate: 2.0e-4
  logging_steps: 10
  save_steps: 50
  eval_steps: 50
  save_total_limit: 3
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  bf16: true
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: true
  dataloader_num_workers: 2
  remove_unused_columns: false
  max_grad_norm: 1.0
  optim: "paged_adamw_8bit"
  torch_compile: true

data:
  train_file: "finetune/data/train.jsonl"
  val_file: "finetune/data/val.jsonl"
  max_seq_length: 2048

# Track3 Medical 4B QLoRA — 已产出版本记录 (checkpoint-259, eval_loss=1.46, 108min)
data_medical_4b:
  train_file: "finetune/data/medical/train.jsonl"
  val_file: "finetune/data/medical/val.jsonl"
  max_seq_length: 2048
  num_train_epochs: 1
  learning_rate: 1.0e-4
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  lora:
    r: 8
    lora_alpha: 16
